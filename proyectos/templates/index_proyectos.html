{% extends 'base.html' %}
{% load markdown_extras %}

{% block content %}
<main class="flex-1">

    <!-- SECCION HERO -->
    <header class="mx-auto max-w-6xl px-6 pt-24 pb-8">

        {% include 'components/hero_1.html' with datos=datos %}

    </header>

    <!-- SECCION BARRA DE FILTROS -->
    <section class="mx-auto max-w-6xl px-6 mb-12">
        <form method="GET" id="filter-form" class="flex flex-wrap gap-4 p-6 rounded-2xl bg-gray-900/20 border border-gray-800/50">
            <!-- Filtro Categoría -->
            <div class="flex-1 min-w-[200px]">
                <label class="block text-[11px] mono font-bold text-gray-500 uppercase mb-2">Categoría</label>
                <select name="categoria" onchange="this.form.submit()" 
                        class="w-full bg-gray-950 border border-gray-800 text-gray-300 text-sm rounded-xl px-4 py-3 focus:ring-accent focus:border-accent transition-all outline-none">
                    <option value="">Todas las categorías</option>
                    {% for cat in categorias %}
                        <option value="{{ cat.id }}" {% if cat_actual == cat.id %}selected{% endif %}>{{ cat.nombre }}</option>
                    {% endfor %}
                </select>
            </div>

            <!-- Filtro Sector -->
            <div class="flex-1 min-w-[200px]">
                <label class="block text-[11px] mono font-bold text-gray-500 uppercase mb-2">Sector</label>
                <select name="sector" onchange="this.form.submit()"
                        class="w-full bg-gray-950 border border-gray-800 text-gray-300 text-sm rounded-xl px-4 py-3 focus:ring-accent focus:border-accent transition-all outline-none">
                    <option value="">Todos los sectores</option>
                    {% for sec in sectores %}
                        <option value="{{ sec.id }}" {% if sec_actual == sec.id %}selected{% endif %}>{{ sec.nombre }}</option>
                    {% endfor %}
                </select>
            </div>

            <!-- Botón Limpiar -->
            {% if cat_actual or sec_actual %}
            <div class="flex items-end">
                <a href="{% url 'proyectos:index' %}" class="px-5 py-3 text-sm font-bold text-muted hover:text-white transition-colors">
                    Limpiar filtros
                </a>
            </div>
            {% endif %}
        </form>
    </section>

    <!-- SECCION GRID DE PROYECTOS -->
    <section id="proyectos" class="border-t border-gray-800/50 bg-[#020617]/50">

        <div class="max-w-6xl mx-auto px-4 py-8 flex flex-col gap-8 ">

            <!-- GRID -->
                
            {% include 'components/grid_proyectos.html' with proyecto=proyecto %}

        </div>
        
    </section>

</main>
{% endblock %}
