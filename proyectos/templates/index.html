{% extends 'base.html' %}

{% block content %}

<h1>Poyectos</h1>

<table class="table">
    <thead>
        <tr>
            <th>TITULO</th>
            <th>DESCRIPCION</th>
            <th>CREADO</th>
        </tr>
    </thead>

    <tbody>
        {% for proyecto in proyectos %}
        <tr>
            <td>
                <a href="{% url 'proyectos:detalle' proyecto.id %}">
                    {{ proyecto.titulo }}
                </a>
            </td>
            <td>{{ proyecto.descripcion }}</td>
            <td>{{ proyecto.creado_en }}</td>
        </tr>
        {% endfor %}
</table>
{% endblock %}
